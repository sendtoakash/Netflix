type User @table {
  displayName: String!
  createdAt: Timestamp!
  email: String
  photoUrl: String
  aiPreferenceProfile: String # JSONB for storing AI-related user preferences/feedback
}

type Movie @table {
  title: String!
  year: Int!
  createdAt: Timestamp!
  summary: String
  genres: [String]
  runtime: Int
  tmdbId: String
  posterUrl: String
  aiTags: [String]
}

type Watch @table {
  user: User!
  movie: Movie!
  createdAt: Timestamp!
  watchDate: Date!
  location: String
  emotionalResponse: String # JSONB, AI could analyze sentiment
}

type Review @table {
  movie: Movie!
  user: User!
  watch: Watch!
  rating: Int!
  createdAt: Timestamp!
  updatedAt: Timestamp!
  reviewText: String
  isPublic: Boolean
}

type List @table {
  user: User!
  name: String!
  isPublic: Boolean!
  createdAt: Timestamp!
  updatedAt: Timestamp!
  description: String
  listType: String
  aiPrompt: String
}

type ListMovie @table(key: ["list", "movie"]) {
  list: List!
  movie: Movie!
  position: Int!
  note: String
}

type RecommendationFeedback @table {
  user: User!
  movie: Movie!
  feedbackType: String!
  createdAt: Timestamp!
  comment: String
}